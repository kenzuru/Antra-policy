<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --ink: #1a1208;
      --accent: #c8401a;
      --mid: #7a6a52;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
      animation: rise 0.9s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      font-weight: 400;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1.4rem;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--mid);
      max-width: 480px;
      margin: 0 auto 2.2rem;
      font-weight: 300;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--ink);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: var(--accent);
    }

    .rule {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Welcome</p>
    <div class="rule"></div>
    <h1>A <em>simple</em> HTML page</h1>
    <p>Clean, warm, and ready for whatever comes next. This is your blank canvas — edit the text, swap the colors, and make it yours.</p>
    <a class="btn" href="#">Get started</a>
  </div>
</body>
</html>
